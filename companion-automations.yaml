# Companion automations for the Medication Reminder integration.
#
# The integration creates a switch per dose (on = given today), handles the
# daily reset, and stores each patient's settings (notify target, nag window,
# nag interval, scheduled days). These automations do the reminders, nagging,
# and missed-dose escalation by reading EVERY dose switch's attributes. Add a
# patient or dose in the UI, or change a patient's settings, and these pick it
# up automatically; no edits needed here.
#
# Cadence: reminders fire on a 5-minute tick (prompt first ping), re-nag every
# patient's `nag_interval` minutes, and escalate once at the window-end
# (`nag_minutes`). A dose is only acted on if today is one of its scheduled
# `days`. Each patient's reminders go to the notify target chosen in the UI.

- id: med_reminder
  alias: "Medication - Reminders & missed-dose escalation"
  trigger:
    - platform: time_pattern
      minutes: "/5"
  variables:
    default_notify: caretakers
    today: "{{ ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] }}"
  action:
    - repeat:
        for_each: >
          {{ states.switch
             | selectattr('attributes.medications', 'defined')
             | map(attribute='entity_id') | list }}
        sequence:
          - variables:
              ent: "{{ repeat.item }}"
              oid: "{{ ent.split('.')[1] }}"
              given: "{{ is_state(ent, 'on') }}"
              dtime: "{{ state_attr(ent, 'dose_time') }}"
              patient: "{{ state_attr(ent, 'patient') }}"
              meds: "{{ state_attr(ent, 'medications') }}"
              days: "{{ state_attr(ent, 'days') or ['mon','tue','wed','thu','fri','sat','sun'] }}"
              scheduled: "{{ today in days }}"
              notify_service: "{{ state_attr(ent, 'notify_service') or default_notify }}"
              nag_minutes: "{{ state_attr(ent, 'nag_minutes') | int(45) }}"
              nag_interval: "{{ state_attr(ent, 'nag_interval') | int(15) }}"
              mins_since: "{{ (now() - today_at(dtime)).total_seconds() / 60 }}"
              clock: "{{ as_timestamp(today_at(dtime)) | timestamp_custom('%-I:%M %p') }}"
          - choose:
              # Reminder: only if scheduled today, within the nag window, not given
              - conditions:
                  - "{{ scheduled and not given and mins_since >= 0 and mins_since < nag_minutes and (mins_since % nag_interval) < 5 }}"
                sequence:
                  - action: "notify.{{ notify_service }}"
                    data:
                      title: "💊 {{ patient }} ({{ clock }})"
                      message: "Give {{ patient }}'s medication: {{ meds }}. Has it been given?"
                      data:
                        tag: "med_{{ oid }}"
                        actions:
                          - action: "MED_GIVEN_{{ oid }}"
                            title: "✅ Mark given"
              # Missed: scheduled today, past the window-end, fires once
              - conditions:
                  - "{{ scheduled and not given and mins_since >= nag_minutes and mins_since < nag_minutes + 5 }}"
                sequence:
                  - action: "notify.{{ notify_service }}"
                    data:
                      title: "⚠️ MISSED: {{ patient }} ({{ clock }})"
                      message: "{{ patient }}'s {{ clock }} dose ({{ meds }}) was NOT marked given. Please check on it."
                      data:
                        tag: "med_missed_{{ oid }}"
                        priority: high
                        ttl: 0
                        push:
                          interruption-level: time-sensitive
                        actions:
                          - action: "MED_GIVEN_{{ oid }}"
                            title: "✅ Mark given"
  mode: single

- id: med_reminder_mark_given
  alias: "Medication - Mark given from notification"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
  condition:
    - "{{ trigger.event.data.action.startswith('MED_GIVEN_') }}"
  variables:
    oid: "{{ trigger.event.data.action | replace('MED_GIVEN_', '') }}"
    ent: "switch.{{ oid }}"
    notify_service: "{{ state_attr(ent, 'notify_service') or 'caretakers' }}"
  action:
    - action: switch.turn_on
      target:
        entity_id: "{{ ent }}"
    - action: "notify.{{ notify_service }}"
      data:
        message: "clear_notification"
        data:
          tag: "med_{{ oid }}"
    - action: "notify.{{ notify_service }}"
      data:
        message: "clear_notification"
        data:
          tag: "med_missed_{{ oid }}"
  mode: parallel

# Low-supply refill reminder. Fires once a day and pings the patient's notify
# target for any medication whose supply has reached its low threshold. Reads
# the per-patient "supplies low" binary sensors created when you track a supply,
# so it picks up new medications automatically; no edits needed here. Change the
# `at:` time to suit, or add more times.
- id: med_supply_low
  alias: "Medication - Low supply refill reminder"
  trigger:
    - platform: time
      at: "09:00:00"
  variables:
    default_notify: caretakers
  action:
    - repeat:
        for_each: >
          {{ states.binary_sensor
             | selectattr('attributes.low_count', 'defined')
             | selectattr('state', 'eq', 'on')
             | map(attribute='entity_id') | list }}
        sequence:
          - variables:
              ent: "{{ repeat.item }}"
              oid: "{{ ent.split('.')[1] }}"
              patient: "{{ state_attr(ent, 'patient') }}"
              low: "{{ (state_attr(ent, 'low') or []) | join(', ') }}"
              notify_service: "{{ state_attr(ent, 'notify_service') or default_notify }}"
          - action: "notify.{{ notify_service }}"
            data:
              title: "💊 Refill soon: {{ patient }}"
              message: "Low medication supply for {{ patient }}: {{ low }}."
              data:
                tag: "med_supply_{{ oid }}"
  mode: single
