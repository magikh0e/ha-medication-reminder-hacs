# Medication Reminder - dashboard (auto-discovering).
#
# Drop-in: this needs no editing. It discovers every patient and dose
# automatically, so adding, renaming, or removing a patient just updates it.
# Six parts:
#   1. a red/green status panel (from the needs_attention sensors)
#   2. a summary of TODAY's scheduled doses (given / still to give, with times)
#   3. one combined "Mark given" card with every dose due today (tap to mark)
#   4. an "As needed (PRN)" card with a Log dose button per as-needed med
#   5. one combined supplies card (units on hand, shown only if you track any)
#   6. a per-patient schedule overview (every dose, time, medications, and days)
#
# Needs two HACS cards:
#   - auto-entities  https://github.com/thomasloven/lovelace-auto-entities
#   - card-mod       https://github.com/thomasloven/lovelace-card-mod
# card-mod pins the pill icons blue so they stay out of the red/yellow/green
# status colours; without it the pills fall back to the default amber.
#
# Paste it as a manual card. No patient names or entity_ids to change.
# Times are shown in 12-hour format; for 24-hour change %-I:%M %p to %H:%M.
# To make the status panel FLASH red when attention is needed, see the README.

type: vertical-stack
cards:
  # 1. Status panel (red/green)
  - type: markdown
    card_mod:
      style: |
        ha-card { background: {% if (states.binary_sensor | selectattr('entity_id','search','_needs_attention') | selectattr('attributes.patient','defined') | selectattr('state','eq','on') | list | length) > 0 %}rgba(244, 67, 54, 0.15){% else %}rgba(76, 175, 80, 0.12){% endif %} !important; }
    content: |-
      {% set s = states.binary_sensor | selectattr('entity_id','search','_needs_attention') | selectattr('attributes.patient','defined') | list %}
      {% set red = s | selectattr('state','eq','on') | list %}
      {% if red | length == 0 %}
      # 🟢 All caught up
      {% else %}
      # 🔴 Attention needed
      {% for p in red %}
      - **{{ p.attributes.patient }}**: {{ p.attributes.overdue | map('replace', p.attributes.patient ~ ' ', '', 1) | join(', ') }}
      {% endfor %}
      {% endif %}

  # 2. Today summary (read-only)
  - type: markdown
    content: |-
      {% set today = ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] %}
      {% set week = ['mon','tue','wed','thu','fri','sat','sun'] %}
      {% set show_patient = (states.switch | selectattr('attributes.medications','defined') | map(attribute='attributes.patient') | unique | list | length) > 1 %}
      {% set ns = namespace(meds=[]) %}
      {% for s in states.switch if s.attributes.medications is defined and s.attributes.get('scheduled_today', today in (s.attributes.days or week)) %}
      {% set ns.meds = ns.meds + [s] %}
      {% endfor %}
      {% set given = ns.meds | selectattr('state','eq','on') | list %}
      {% set pending = ns.meds | selectattr('state','eq','off') | list %}
      {% set ns2 = namespace(overdue=[], upcoming=[]) %}
      {% for x in pending %}
      {% set mins = (as_timestamp(now()) - as_timestamp(today_at(x.attributes.dose_time))) / 60 %}
      {% if mins >= (x.attributes.nag_minutes | int(45)) %}
      {% set ns2.overdue = ns2.overdue + [x] %}
      {% else %}
      {% set ns2.upcoming = ns2.upcoming + [x] %}
      {% endif %}
      {% endfor %}
      ### 💊 Doses today: {{ given|length }}/{{ ns.meds|length }} given
      {% if ns.meds|length == 0 -%}
      No doses scheduled today.
      {%- elif not pending -%}
      ✅ All doses given for today.
      {%- else -%}
      {% if ns2.overdue %}**⚠️ Overdue:**
      {% for x in ns2.overdue | sort(attribute='attributes.dose_time') %}
      {%- set f = '%H:%M' if x.attributes.time_format == '24h' else '%-I:%M %p' %}
      - {% if show_patient %}{{ x.attributes.patient }} {% endif %}{{ as_timestamp(today_at(x.attributes.dose_time)) | timestamp_custom(f) }} ({{ x.attributes.medications }})
      {%- endfor %}
      {% endif %}
      {% if ns2.upcoming %}**⏳ Upcoming:**
      {% for x in ns2.upcoming | sort(attribute='attributes.dose_time') %}
      {%- set f = '%H:%M' if x.attributes.time_format == '24h' else '%-I:%M %p' %}
      - {% if show_patient %}{{ x.attributes.patient }} {% endif %}{{ as_timestamp(today_at(x.attributes.dose_time)) | timestamp_custom(f) }} ({{ x.attributes.medications }})
      {%- endfor %}
      {% endif %}
      {%- endif %}
      {% set low = states.binary_sensor | selectattr('attributes.low_count','defined') | selectattr('state','eq','on') | list %}
      {% if low %}

      **📦 Refill soon:** {% for b in low %}{{ b.attributes.patient }} ({{ (b.attributes.low or []) | join(', ') }}){% if not loop.last %}; {% endif %}{% endfor %}
      {% endif %}
      {% if given|length > 0 %}

      **Already given:**
      {% for x in given | sort(attribute='last_changed') %}
      {%- set gat = x.attributes.given_at or x.last_changed %}
      {%- set f = '%H:%M' if x.attributes.time_format == '24h' else '%-I:%M %p' %}
      - ✅ {% if show_patient %}{{ x.attributes.patient }} {% endif %}{{ x.attributes.medications }} at {{ as_timestamp(gat) | timestamp_custom(f) }}
      {%- endfor %}
      {% endif %}

  # 3. Every dose due today (tap to mark given), auto-discovers all patients
  - type: custom:auto-entities
    card:
      type: entities
      title: Mark given
      show_header_toggle: false
      card_mod:
        style: |
          ha-card {
            --state-switch-on-color: #2196f3;
            --state-active-color: #2196f3;
            --state-icon-active-color: #2196f3;
            --paper-item-icon-active-color: #2196f3;
            --state-icon-color: #90caf9;
            --paper-item-icon-color: #90caf9;
          }
    filter:
      template: >
        {% set today = ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] %}
        {% for s in states.switch if s.attributes.medications is defined
           and s.attributes.get('scheduled_today', today in (s.attributes.days or ['mon','tue','wed','thu','fri','sat','sun'])) %}
        {{ s.entity_id }}
        {% endfor %}
    sort:
      method: name

  # 3b. As-needed (PRN) meds: tap "Log dose" to record one (decrements supply),
  # with each med's "last taken" time shown beside it. Hidden if you have no PRN
  # doses.
  - type: custom:auto-entities
    show_empty: false
    card:
      type: entities
      title: As needed (PRN)
      show_header_toggle: false
      card_mod:
        style: |
          ha-card {
            --state-icon-color: #2196f3;
            --paper-item-icon-color: #2196f3;
          }
    filter:
      template: >
        {% for s in states.button if s.name and 'Log ' in s.name and s.name.endswith('dose') %}
        {{ s.entity_id }}
        {% endfor %}
        {% for s in states.sensor if s.name and s.name.endswith('last taken') %}
        {{ s.entity_id }}
        {% endfor %}
    sort:
      method: name

  # 4. All supplies on hand, auto-discovers, hidden if none tracked
  - type: custom:auto-entities
    show_empty: false
    card:
      type: entities
      title: Supplies on hand
      show_header_toggle: false
      card_mod:
        style: |
          ha-card {
            --state-icon-color: #2196f3;
            --paper-item-icon-color: #2196f3;
          }
    filter:
      template: >
        {% for s in states.number if s.attributes.medication is defined %}
        {{ s.entity_id }}
        {% endfor %}
    sort:
      method: name

  # 5. Per-patient schedule overview (read-only), auto-discovers
  - type: markdown
    content: |-
      ## 📋 Medication schedule
      {% set meds = states.switch | selectattr('attributes.medications','defined') | list %}
      {% set week = ['mon','tue','wed','thu','fri','sat','sun'] %}
      {% for p in (meds | map(attribute='attributes.patient') | unique | list | sort) %}
      {% set pdoses = meds | selectattr('attributes.patient','eq',p) | sort(attribute='attributes.dose_time') | list %}
      {% set ptype = pdoses[0].attributes.patient_type | default('person') %}
      ### {{ {'dog':'🐕','cat':'🐈','person':'🧑','bird':'🐦','rabbit':'🐇','other':'🐾'}.get(ptype,'💊') }} {{ p }}
      {% for d in pdoses %}
      {%- set days = d.attributes.days or week %}
      {%- set fmt = '%H:%M' if d.attributes.time_format == '24h' else '%-I:%M %p' %}
      {%- set n = d.attributes.interval_days | int(2) %}
      {%- set stype = d.attributes.schedule_type %}
      {%- if stype == 'interval' %}
      {%- set cadence = 'Daily' if n == 1 else 'Every ' ~ n ~ ' days' %}
      {%- elif stype == 'cycle' %}
      {%- set cadence = (d.attributes.cycle_on | int(21)) ~ ' on / ' ~ (d.attributes.cycle_off | int(7)) ~ ' off' %}
      {%- elif stype == 'prn' %}
      {%- set cadence = 'As needed' %}
      {%- elif stype == 'monthly' %}
      {%- set cadence = 'Monthly (' ~ (d.attributes.month_days | join(', ')) ~ ')' %}
      {%- else %}
      {%- set cadence = 'Daily' if days|length == 7 else (week | select('in', days) | map('capitalize') | join(', ')) %}
      {%- endif %}
      {%- if stype == 'prn' %}
      - {{ d.attributes.medications }} ({{ cadence }})
      {%- else %}
      - **{{ as_timestamp(today_at(d.attributes.dose_time)) | timestamp_custom(fmt) }}** {{ d.attributes.medications }} ({{ cadence }})
      {%- endif %}
      {%- endfor %}
      {% endfor %}
