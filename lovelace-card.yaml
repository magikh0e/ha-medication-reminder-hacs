# Medication Reminder - dashboard.
#
# A day-of-week-aware dashboard with three parts:
#   1. a red/green status panel (driven by the needs_attention sensors)
#   2. a summary of TODAY's scheduled doses (given / still to give, with times)
#   3. a per-patient card listing each patient's doses scheduled today
#
# Needs the HACS "auto-entities" card
# (https://github.com/thomasloven/lovelace-auto-entities).
#
# Replace the example patient names ("Buddy", "Mittens") and the
# binary_sensor entity_ids with your own - the `patient ==` filter must match
# the switch's `patient` attribute exactly. Set each patient's type in the
# integration so the header emoji is right (otherwise it falls back to 💊).
#
# Times are shown in 12-hour format; for 24-hour change %-I:%M %p to %H:%M.
# To make the status panel FLASH red when attention is needed, see the README
# (needs the card-mod card).

type: vertical-stack
cards:
  - type: markdown
    content: |-
      {% set s = states.binary_sensor | selectattr('entity_id','search','_needs_attention') | list %}
      {% set red = s | selectattr('state','eq','on') | list %}
      {% if red | length == 0 %}
      # 🟢 All OK
      {% else %}
      # 🔴 Attention needed
      {% for p in red %}
      - **{{ p.attributes.patient }}**: {{ p.attributes.overdue | join(', ') }}
      {% endfor %}
      {% endif %}
  - type: markdown
    content: |-
      {% set today = ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] %}
      {% set ns = namespace(meds=[]) %}
      {% for s in states.switch if s.attributes.medications is defined and today in (s.attributes.days or ['mon','tue','wed','thu','fri','sat','sun']) %}
      {% set ns.meds = ns.meds + [s] %}
      {% endfor %}
      {% set given = ns.meds | selectattr('state','eq','on') | list %}
      {% set pending = ns.meds | selectattr('state','eq','off') | list | sort(attribute='name') %}
      ### 💊 Doses today: {{ given|length }}/{{ ns.meds|length }} given
      {% if ns.meds|length == 0 -%}
      No doses scheduled today.
      {%- elif pending|length == 0 -%}
      ✅ All doses given for today.
      {%- else -%}
      **Still to give:**
      {% for x in pending %}
      - ⏳ {{ x.attributes.patient }} {{ as_timestamp(today_at(x.attributes.dose_time)) | timestamp_custom('%-I:%M %p') }} ({{ x.attributes.medications }})
      {%- endfor %}
      {%- endif %}
      {% if given|length > 0 %}

      **Given:**
      {% for x in given | sort(attribute='last_changed') %}
      - ✅ {{ x.attributes.patient }} {{ as_timestamp(today_at(x.attributes.dose_time)) | timestamp_custom('%-I:%M %p') }} at {{ as_timestamp(x.last_changed) | timestamp_custom('%-I:%M %p') }}
      {%- endfor %}
      {% endif %}
  - type: markdown
    content: >
      ## {{ {'dog':'🐕','cat':'🐈','person':'🧑','bird':'🐦','rabbit':'🐇','other':'🐾'}.get(state_attr('binary_sensor.buddy_all_doses_given','patient_type'),'💊') }} Buddy
  - type: custom:auto-entities
    card:
      type: entities
      show_header_toggle: false
    filter:
      template: >
        {% set today = ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] %}
        {% for s in states.switch if s.attributes.medications is defined
           and s.attributes.patient == 'Buddy'
           and today in (s.attributes.days or ['mon','tue','wed','thu','fri','sat','sun']) %}
        {{ s.entity_id }}
        {% endfor %}
  - type: markdown
    content: >
      ## {{ {'dog':'🐕','cat':'🐈','person':'🧑','bird':'🐦','rabbit':'🐇','other':'🐾'}.get(state_attr('binary_sensor.mittens_all_doses_given','patient_type'),'💊') }} Mittens
  - type: custom:auto-entities
    card:
      type: entities
      show_header_toggle: false
    filter:
      template: >
        {% set today = ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] %}
        {% for s in states.switch if s.attributes.medications is defined
           and s.attributes.patient == 'Mittens'
           and today in (s.attributes.days or ['mon','tue','wed','thu','fri','sat','sun']) %}
        {{ s.entity_id }}
        {% endfor %}
