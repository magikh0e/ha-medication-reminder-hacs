# Medication Reminder - dashboard cards.
#
# Two layouts to choose from. Copy the one you want into a dashboard as a
# manual card. Both need the HACS "auto-entities" card
# (https://github.com/thomasloven/lovelace-auto-entities); the summary needs
# nothing extra. All times are shown in 12-hour format.
#
# ===========================================================================
# OPTION A (active below) - Simple: a summary plus one auto-entities list of
# every dose. Zero maintenance: add a patient or dose and it appears. No
# per-patient grouping. Best if you just want it to work with no editing.
# ===========================================================================

type: vertical-stack
cards:
  - type: markdown
    content: |-
      {% set meds = states.switch | selectattr('attributes.medications','defined') | list %}
      {% set given = meds | selectattr('state','eq','on') | list %}
      {% set pending = meds | selectattr('state','eq','off') | list | sort(attribute='name') %}
      ### 💊 Doses today: {{ given|length }}/{{ meds|length }} given
      {% if pending|length == 0 -%}
      ✅ All doses given for today.
      {%- else -%}
      **Still to give:**
      {% for s in pending %}
      - ⏳ {{ s.attributes.patient }} {{ as_timestamp(today_at(s.attributes.dose_time)) | timestamp_custom('%-I:%M %p') }} ({{ s.attributes.medications }})
      {%- endfor %}
      {%- endif %}
      {% if given|length > 0 %}

      **Given:**
      {% for s in given | sort(attribute='last_changed') %}
      - ✅ {{ s.attributes.patient }} {{ as_timestamp(today_at(s.attributes.dose_time)) | timestamp_custom('%-I:%M %p') }} at {{ as_timestamp(s.last_changed) | timestamp_custom('%-I:%M %p') }}
      {%- endfor %}
      {% endif %}
  - type: custom:auto-entities
    card:
      type: entities
      title: 💊 Medication
      show_header_toggle: false
    filter:
      include:
        - entity_id: "switch.*"
          attributes:
            medications: "*"
    sort:
      method: friendly_name

